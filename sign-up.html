<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocerymart</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="./assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="./assets/favicon/site.webmanifest" />

    <!-- Fonts -->
    <link rel="stylesheet" href="./assets/fonts/stylesheet.css">

    <!-- Styles -->
     <link rel="stylesheet" href="./assets/css/main.css">

     <!-- SCRIPTS -->
    <script src="./assets/js/scripts.js"></script>
</head>
<body>
    <main class="auth">
        <div class="auth__intro">
            <img src="./assets/img/auth/intro.svg" alt="" class="auth__intro-img">
            <p class="auth__intro-text"> The best of luxury brand values, high quality products, and innovative services</p>
        </div>
        <div class="auth__content">
            <div class="auth__content-inner">
                <div class="logo">
                    <img src="./assets/icons/logo.svg" alt="grocerymart" class="logo__img">
                    <h1 class="logo__title">grocerymart</h1>
                </div>
                <h1 class="auth__heading">Sign Up</h1>
                <p class="auth__desc">Let's create your account and  Shop like a pro and save money.</p>
                <form action="" class="form auth__form">
                    <div class="form__group">
                        <div class="form__text-input">
                            <input 
                                type="email" 
                                name="" 
                                id="" 
                                placeholder="Email"
                                class="form__input">
                            <img src="./assets/icons/email.svg" alt="" class="form__input-icon">
                        </div>
                    </div>
                    <div class="form__group">
                        <div class="form__text-input">
                            <input 
                                type="password" 
                                name="" 
                                id="" 
                                placeholder="Password"
                                class="form__input">
                            <img src="./assets/icons/password.svg" alt="" class="form__input-icon">
                        </div>
                    </div>
                    <div class="form__group">
                        <div class="form__text-input">
                            <input 
                                type="password" 
                                name="" 
                                id="" 
                                placeholder="Confirm Password"
                                class="form__input">
                            <img src="./assets/icons/password.svg" alt="" class="form__input-icon">
                        </div>
                    </div>
                    <div class="form__group form__group--inline">
                        <label for="default" class="form__checkbox">
                            <input 
                                hidden
                                type="checkbox" 
                                name="default" 
                                id="default"
                                class="form__checkbox-input">
                            <span class="form-checkbox-label">Set as default card</span>
                        </label>
                        <a href="" class="auth__link form__pull-right">Recovery Password</a>
                    </div>
                    <div class="form__group auth__btn-group">
                        <button class="btn btn--primary auth__btn">Sign Up</button>
                        <button class="btn btn--outline auth__btn btn--no-margin">
                            <img src="./assets/icons/gmail.svg" alt="" class="btn-icon">
                            Sign in with Gmail
                        </button>
                    </div>
                </form>
                <p class="auth__text">
                    You have an account yet?
                    <a href="./sign-in.html" class="auth__link">
                        Sign In
                    </a>
                </p>
            </div>
        </div>
    </main>
</body>
</html>
