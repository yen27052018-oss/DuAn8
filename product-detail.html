<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocerymart</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="./assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="./assets/favicon/site.webmanifest" />

    <!-- Fonts -->
    <link rel="stylesheet" href="./assets/fonts/stylesheet.css">

    <!-- Styles -->
     <link rel="stylesheet" href="./assets/css/main.css">

     <!-- SCRIPTS -->
    <script src="./assets/js/scripts.js"></script>
</head>
<body>
    <!-- Header -->
    <header id="header" class="header"></header>
    <script>
        load("#header", "./template/header-logined.html");
    </script>

    <div class="product-page">
        <div class="container">
            <!-- Breadcrumb -->
            <div class="product-container">
                 <ul class="breadcumbs">
                    <li class="breadcumbs__item">
                        <a href="#!" class="breadcumbs__link">Departments
                            <img src="./assets/icons/arrow-right.svg" alt="" class="breadcumbs__icon">
                        </a>
                    </li>
                    <li class="breadcumbss__item">
                        <a href="#!" class="breadcumbs__link">Coffe
                            <img src="./assets/icons/arrow-right.svg" alt="" class="breadcumbs__icon">
                        </a>
                    </li>
                    <li class="breadcumbs__item">
                        <a href="#!" class="breadcumbs__link">Coffee Beans
                            <img src="./assets/icons/arrow-right.svg" alt="" class="breadcumbs__icon">
                        </a>
                    </li>
                    <li class="breadcumbs__item">
                        <a href="#!" class="breadcumbs__link breadcumbs__link--current">LavAzza</a>
                    </li>
                 </ul>
            </div>
            <!-- Product info -->
            <div class="product-container prod-info-content">
                <div class="row">
                    <div class="col-5 col-xl-6 col-lg-12">
                        <div class="prod-preview">
                            <div class="prod-preview__list">
                                <div class="prod-preview__item">
                                    <img src="./assets/img/product-item/item-1.png" alt="" class="prod-preview__img">
                                </div>
                                <div class="prod-preview__item">
                                    <img src="./assets/img/product-item/item-1.png" alt="" class="prod-preview__img">
                                </div>
                                <div class="prod-preview__item">
                                    <img src="./assets/img/product-item/item-1.png" alt="" class="prod-preview__img">
                                </div>
                                <div class="prod-preview__item">
                                    <img src="./assets/img/product-item/item-1.png" alt="" class="prod-preview__img">
                                </div>
                            </div>
                            <div class="prod-preview__thumbs">
                                <img src="./assets/img/product-item/item-1.png" alt="" class="prod-preview__thumb-img prod-preview__thumb-img--current">
                                <img src="./assets/img/product-item/item-1.png" alt="" class="prod-preview__thumb-img">
                                <img src="./assets/img/product-item/item-1.png" alt="" class="prod-preview__thumb-img">
                                <img src="./assets/img/product-item/item-1.png" alt="" class="prod-preview__thumb-img">
                            </div>
                        </div>
                    </div>
                    <div class="col-7 col-xl-6 col-lg-12">
                        <form action="" class="form">

                            <section class="prod-info">
                                <h1 class="prod-info__heading">
                                    Coffee Beans - Espresso Arabica and Robusta Beans
                                </h1>
                                <div class="row">
                                    <div class="col-5 col-xxl-6 col-xl-12">
                                        <div class="prod-prop">
                                            <img src="./assets/icons/star.svg" alt="" class="prod-prop__icon">
                                            <h4 class="prod-prop__title">(3.5) 1100 reviews</h4>
                                        </div>
                                        <label for="" class="form-label prod-info__label">Size/Weight</label>
                                        <div class="filter__form-group">
                                            <div class="form__select-wrap">
                                                <div class="form__select" style="--width:130px"> 500g
                                                    <img src="./assets/icons/select-arrow.svg" alt="" 
                                                    class="form__select-arrow">
                                                </div>
                                                <div class="form__select"> Gram
                                                    <img src="./assets/icons/select-arrow.svg" alt="" 
                                                    class="form__select-arrow">
                                                </div>
                                            </div>
                                        </div>
                                        <div class="filter__form-group">
                                            <div class="form__tags">
                                                <button class="form__tag prod-info__tag">Small</button>
                                                <button class="form__tag prod-info__tag">Medium</button>
                                                <button class="form__tag prod-info__tag">Large</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-7 col-xxl-6 col-xl-12 prod-props">
                                        <div class="prod-prop">
                                            <img src="./assets/icons/document.svg" alt="" class="prod-prop__icon">
                                            <h4 class="prod-prop__title">Compare</h4>
                                        </div>
                                        <div class="prod-prop">
                                            <img src="./assets/icons/buy.svg" alt="" class="prod-prop__icon">
                                            <div>
                                                <h4 class="prod-prop__title">Delivery</h4>
                                                <p class="prod-prop__desc">From $6 for 1-3 days</p>
                                            </div>
                                        </div>
                                        <div class="prod-prop">
                                            <img src="./assets/icons/bag.svg" alt="" class="prod-prop__icon">
                                            <div>
                                                <h4 class="prod-prop__title">Pickup</h4>
                                                <p class="prod-prop__desc">Out of 2 store, today</p>
                                            </div>
                                        </div>
                                        <div class="prod-info__card">
                                            <div class="prod-info__row">
                                                <span class="prod-info__price">$500.00</span>
                                                <span class="prod-info__tax">10%</span>
                                            </div>
                                            <span class="prod-info__total">$540.00</span>
                                            <div class="prod-info__row">
                                                <button class="btn btn--primary prod-info__add-to-cart">Add to cart</button>
                                                <button class="like-btn prod-info__like-btn">
                                                    <img src="./assets/icons/heart.svg" alt="" class="like-btn__icon icon">
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
        <footer id="footer" class="footer"></footer>
        <script>
            load("#footer", "./template/footer.html");
        </script>
</body>
</html>
